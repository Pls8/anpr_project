<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANPR - Live Video</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 20px; }
        
        .nav { text-align: center; margin-bottom: 20px; }
        .nav a {
            color: #4CAF50; text-decoration: none; font-size: 1.2em;
            padding: 10px 20px; border: 2px solid #4CAF50; border-radius: 5px;
        }
        
        .video-container {
            background: white; border-radius: 15px; padding: 20px; color: #333;
        }
        
        video {
            width: 100%; max-width: 640px; display: block; margin: 0 auto;
            border-radius: 10px;
        }
        
        .controls { display: flex; justify-content: center; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        button {
            padding: 12px 24px; font-size: 1em; border: none; border-radius: 8px;
            cursor: pointer; background: #4CAF50; color: white;
        }
        button:hover { background: #45a049; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        button.stop { background: #f44336; }
        
        .result {
            text-align: center; margin-top: 20px; padding: 20px;
            background: #f5f5f5; border-radius: 10px;
        }
        #plateText { font-size: 2em; font-weight: bold; color: #4CAF50; }
        
        .info { text-align: center; margin-top: 20px; color: #ccc; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 ANPR Live Video</h1>
        
        <div class="nav">
            <a href="/">📷 Image Upload</a>
            <a href="/video">🎥 Video Stream</a>
        </div>
        
        <div class="video-container">
            <video id="video" autoplay playsinline></video>
            
            <div class="controls">
                <button id="startBtn" onclick="startCamera()">📹 Start Camera</button>
                <button id="stopBtn" class="stop" onclick="stopCamera()" disabled>⏹ Stop</button>
            </div>
            
            <div class="result">
                <div>Detected Plate:</div>
                <div id="plateText">--</div>
            </div>
        </div>
        
        <div class="info">
            <p>For DroidCam: Use OBS Virtual Camera or change camera in browser settings</p>
        </div>
    </div>
    
    <script>
        let stream = null;
        let processing = false;
        let lastProcessTime = 0;
        
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                document.getElementById('video').srcObject = stream;
                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;
                
                // Start processing frames
                processFrame();
            } catch (e) {
                alert('Error accessing camera: ' + e.message);
            }
        }
        
        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            document.getElementById('video').srcObject = null;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('plateText').textContent = '--';
        }
        
        async function processFrame() {
            if (!stream) return;
            
            const now = Date.now();
            // Process every 500ms to avoid overwhelming the server
            if (now - lastProcessTime > 500) {
                lastProcessTime = now;
                
                const video = document.getElementById('video');
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                canvas.toBlob(async (blob) => {
                    const formData = new FormData();
                    formData.append('file', blob, 'frame.jpg');
                    
                    try {
                        const response = await fetch('/upload', {
                            method: 'POST',
                            body: formData
                        });
                        const data = await response.json();
                        if (data.success && data.plates && data.plates.length > 0) {
                            document.getElementById('plateText').textContent = data.plates[0];
                        }
                    } catch (e) {
                        console.error('Error processing frame:', e);
                    }
                }, 'image/jpeg');
            }
            
            requestAnimationFrame(processFrame);
        }
    </script>
</body>
</html>
