<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANPR - Video Stream</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        
        .nav {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .nav a {
            color: #4CAF50;
            text-decoration: none;
            font-size: 1.2em;
            margin: 0 15px;
            padding: 10px 20px;
            border: 2px solid #4CAF50;
            border-radius: 5px;
            transition: all 0.3s;
        }
        
        .nav a:hover {
            background: #4CAF50;
            color: white;
        }
        
        .video-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
        }
        
        #videoStream {
            width: 100%;
            display: block;
        }
        
        .no-camera {
            width: 100%;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5em;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 15px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        #startBtn {
            background: #4CAF50;
            color: white;
        }
        
        #startBtn:hover {
            background: #45a049;
            transform: scale(1.05);
        }
        
        #stopBtn {
            background: #f44336;
            color: white;
        }
        
        #stopBtn:hover {
            background: #da190b;
            transform: scale(1.05);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .result {
            text-align: center;
            margin-top: 20px;
        }
        
        .result h2 {
            color: #333;
            font-size: 1.5em;
            margin-bottom: 10px;
        }
        
        #plateText {
            font-size: 3em;
            font-weight: bold;
            color: #4CAF50;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
            display: inline-block;
            min-width: 200px;
        }
        
        .info {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 ANPR Video Stream</h1>
        
        <div class="nav">
            <a href="/">📷 Image Upload</a>
            <a href="/video">🎥 Video Stream</a>
        </div>
        
        <div class="video-container">
            <div class="video-wrapper">
                <img id="videoStream" src="" alt="Video Stream" style="display: none;">
                <div id="noCamera" class="no-camera">
                    Click "Start Camera" to begin
                </div>
            </div>
            
            <div class="controls">
                <button id="startBtn" onclick="startCamera()">📹 Start Camera</button>
                <button id="stopBtn" onclick="stopCamera()" disabled>⏹ Stop Camera</button>
            </div>
            
            <div class="result">
                <h2>Detected Plate:</h2>
                <div id="plateText">--</div>
            </div>
            
            <div class="info">
                <p>Connect your phone camera using USB tethering or WiFi streaming app</p>
            </div>
        </div>
    </div>
    
    <script>
        let statusInterval;
        
        async function startCamera() {
            try {
                const response = await fetch('/video/start', { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('videoStream').style.display = 'block';
                    document.getElementById('noCamera').style.display = 'none';
                    document.getElementById('videoStream').src = '/video/feed?' + new Date().getTime();
                    document.getElementById('startBtn').disabled = true;
                    document.getElementById('stopBtn').disabled = false;
                    
                    // Start polling for status
                    statusInterval = setInterval(updateStatus, 500);
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (e) {
                alert('Error starting camera: ' + e);
            }
        }
        
        async function stopCamera() {
            try {
                await fetch('/video/stop', { method: 'POST' });
                
                document.getElementById('videoStream').style.display = 'none';
                document.getElementById('noCamera').style.display = 'flex';
                document.getElementById('noCamera').textContent = 'Camera stopped';
                document.getElementById('startBtn').disabled = false;
                document.getElementById('stopBtn').disabled = true;
                document.getElementById('plateText').textContent = '--';
                
                clearInterval(statusInterval);
            } catch (e) {
                alert('Error stopping camera: ' + e);
            }
        }
        
        async function updateStatus() {
            try {
                const response = await fetch('/video/status');
                const data = await response.json();
                
                if (data.plate) {
                    document.getElementById('plateText').textContent = data.plate;
                }
            } catch (e) {
                console.log('Status update error:', e);
            }
        }
    </script>
</body>
</html>
