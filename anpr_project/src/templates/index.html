<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omani ANPR System</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 40px;
        }
        .upload-box {
            background: rgba(255,255,255,0.05);
            border: 2px dashed #00d9ff;
            border-radius: 20px;
            padding: 60px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-box:hover {
            background: rgba(0,217,255,0.1);
            border-color: #00ff88;
        }
        .upload-box input {
            display: none;
        }
        .upload-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        .upload-text {
            font-size: 1.2rem;
            color: #ccc;
        }
        .btn {
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .result-box {
            margin-top: 40px;
            display: none;
        }
        .result-box.show { display: block; }
        .plates-found {
            background: rgba(0,255,136,0.1);
            border: 1px solid #00ff88;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
        }
        .plate-count {
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
        .plate-list {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }
        .plate-item {
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            color: #000;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.5rem;
            font-weight: bold;
            font-family: monospace;
        }
        .result-image {
            margin-top: 30px;
            text-align: center;
        }
        .result-image img {
            max-width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .loading.show { display: block; }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0,217,255,0.3);
            border-top-color: #00d9ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .error {
            background: rgba(255,0,0,0.1);
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 Omani ANPR System</h1>
        <p class="subtitle">Automatic Number Plate Recognition for Oman</p>
        
        <label class="upload-box">
            <input type="file" id="fileInput" accept="image/*">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Click to upload car image</div>
            <button class="btn" id="processBtn" onclick="document.getElementById('fileInput').click()">Select Image</button>
        </label>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processing image...</p>
        </div>
        
        <div class="error" id="error" style="display:none;"></div>
        
        <div class="result-box" id="resultBox">
            <div class="plates-found">
                <div class="plate-count" id="plateCount">Found 0 plates</div>
                <div class="plate-list" id="plateList"></div>
            </div>
            <div class="result-image">
                <img id="resultImg" src="" alt="Result">
            </div>
        </div>
    </div>
    
    <script>
        const fileInput = document.getElementById('fileInput');
        const processBtn = document.getElementById('processBtn');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const resultBox = document.getElementById('resultBox');
        const plateCount = document.getElementById('plateCount');
        const plateList = document.getElementById('plateList');
        const resultImg = document.getElementById('resultImg');
        
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            processBtn.textContent = 'Processing...';
            processBtn.disabled = true;
            loading.classList.add('show');
            error.style.display = 'none';
            resultBox.classList.remove('show');
            
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Processing failed');
                }
                
                plateCount.textContent = `Found ${data.count} plate(s)`;
                plateList.innerHTML = data.plates.map(p => 
                    `<div class="plate-item">${p}</div>`
                ).join('');
                resultImg.src = data.image;
                resultBox.classList.add('show');
                
            } catch (err) {
                error.textContent = err.message;
                error.style.display = 'block';
            } finally {
                loading.classList.remove('show');
                processBtn.textContent = 'Select Image';
                processBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
